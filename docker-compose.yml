version: '3.9'
services:
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app/backend
      - ./.env:/app/.env:ro
    env_file:
      - .env
    command: sh -c "pip install -r /app/backend/requirements.txt && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - '8000:8000'
